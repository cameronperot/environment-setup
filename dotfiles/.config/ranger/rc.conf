# ~/.config/ranger/rc.conf
#
# Overrides only. Ranger loads the packaged default rc.conf first,
# then this file. Keep this small so upgrades pick up new defaults.
#
# Full reference:
#   https://github.com/ranger/ranger/blob/master/ranger/config/rc.conf
# Regenerate the reference locally with:
#   ranger --copy-config=rc

# --- Display -----------------------------------------------------------------
set show_hidden true
set line_numbers relative
set scroll_offset 4

# --- VCS ---------------------------------------------------------------------
set vcs_aware true
set vcs_backend_git enabled

# --- Keybindings -------------------------------------------------------------
map <C-f> fzf_select
