# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'laktak/extrakto'
set -g @extrakto_clip_tool_run tmux_osc52

# General
unbind C-b
set -g prefix C-q
bind C-q send-prefix
set -g base-index 1
setw -g pane-base-index 1
set -g escape-time 1
set -g history-limit 250000
set -g focus-events on
set -g detach-on-destroy off
set -g display-time 3000
set -s set-clipboard on

# Terminal and appearance
set -g default-terminal "xterm-kitty"
set -ga terminal-overrides ",xterm-kitty:Tc,*256col*:RGB"
set -g status-bg colour236
set -g status-fg colour250
set -g status-right "#H | %Y-%m-%d %H:%M %Z"
set -g status-interval 10
set -g window-status-current-style "fg=colour117,bg=colour238,bold"
set -g pane-active-border-style bg=colour235,fg=colour250
set -g pane-border-style fg=colour236

# Automatic window renaming
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# SSH
setenv -g SSH_AUTH_SOCK $HOME/.ssh/ssh_auth_sock
set -g update-environment -r

# VI mode
setw -g mode-keys vi
setw -g status-keys vi

# Pane navigation
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D
bind -n M-H swap-pane -s '{left-of}'
bind -n M-L swap-pane -s '{right-of}'
bind -n M-K swap-pane -s '{up-of}'
bind -n M-J swap-pane -s '{down-of}'
bind -n M-left select-pane -L
bind -n M-right select-pane -R
bind -n M-up select-pane -U
bind -n M-down select-pane -D
bind -n M-b break-pane
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-[ previous-window
bind -n M-] next-window
bind -n M-'{' swap-window -t -1\; select-window -t -1
bind -n M-'}' swap-window -t +1\; select-window -t +1
bind -n M-tab last-window

# Session navigation
bind n switch-client -n
bind p switch-client -p
bind -n M-BTab switch-client -l
bind s choose-tree -sZ -O name

# New windows/panes
unbind '"'
bind c new-window -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
bind h split-window -h -c "#{pane_current_path}"

# Copy mode
bind -n M-v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Popup windows
bind P display-popup -w 90% -h 90%
bind T display-popup -w 90% -h 90% -E "nvim ~/todo.md"
bind B display-popup -w 90% -h 90% -E "btop"

# Utilities
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
bind b set-option -g status

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
